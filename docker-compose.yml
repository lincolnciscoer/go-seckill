services:
  mysql:
    image: mysql:8.0.41
    container_name: go-seckill-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-go_seckill}
      MYSQL_USER: ${MYSQL_USER:-go_seckill}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-go_seckill123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: go-seckill-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rocketmq-namesrv:
    image: docker.m.daocloud.io/apache/rocketmq:5.3.2
    container_name: go-seckill-rmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"

  rocketmq-broker:
    image: docker.m.daocloud.io/apache/rocketmq:5.3.2
    container_name: go-seckill-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"

  rocketmq-proxy:
    image: docker.m.daocloud.io/apache/rocketmq:5.3.2
    container_name: go-seckill-rmq-proxy
    restart: unless-stopped
    depends_on:
      - rocketmq-broker
    command: sh mqproxy
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "${ROCKETMQ_PROXY_PORT:-8081}:8081"

  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:v2.54.1
    container_name: go-seckill-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: docker.m.daocloud.io/grafana/grafana:11.1.4
    container_name: go-seckill-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

  jaeger:
    image: docker.m.daocloud.io/jaegertracing/all-in-one:1.57
    container_name: go-seckill-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTEL_GRPC_PORT:-4317}:4317"

volumes:
  mysql-data:
  redis-data:
