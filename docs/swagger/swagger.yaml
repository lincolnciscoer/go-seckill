basePath: /
definitions:
  handler.CreateActivityRequest:
    properties:
      end_time:
        type: string
      name:
        maxLength: 128
        minLength: 2
        type: string
      product_id:
        type: integer
      start_time:
        type: string
      status:
        type: integer
      total_stock:
        minimum: 1
        type: integer
    required:
    - end_time
    - name
    - product_id
    - start_time
    - total_stock
    type: object
  handler.CreateProductRequest:
    properties:
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 128
        minLength: 2
        type: string
      price:
        minimum: 1
        type: integer
      status:
        type: integer
    required:
    - name
    - price
    type: object
  handler.DependencyStatus:
    properties:
      message:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  handler.HealthData:
    properties:
      dependencies:
        items:
          $ref: '#/definitions/handler.DependencyStatus'
        type: array
      service:
        type: string
      status:
        type: string
      time:
        type: string
    type: object
  handler.HealthSuccessResponse:
    properties:
      code:
        type: string
      data:
        $ref: '#/definitions/handler.HealthData'
      message:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      password:
        maxLength: 72
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  handler.RegisterRequest:
    properties:
      password:
        maxLength: 72
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  response.Envelope:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: A step-by-step Go seckill backend project
  title: go-seckill API
  version: 0.1.0
paths:
  /api/v1/activities:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: 秒杀活动列表
      tags:
      - activity
    post:
      consumes:
      - application/json
      parameters:
      - description: 创建秒杀活动请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateActivityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 创建秒杀活动
      tags:
      - activity
  /api/v1/activities/{id}:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: 秒杀活动详情
      tags:
      - activity
  /api/v1/activities/{id}/preheat:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 预热秒杀活动缓存
      tags:
      - activity
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: 用户注册
      tags:
      - auth
  /api/v1/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 当前登录用户信息
      tags:
      - auth
  /api/v1/orders/{orderNo}:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 订单详情
      tags:
      - order
  /api/v1/orders/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 当前用户订单列表
      tags:
      - order
  /api/v1/products:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      summary: 商品列表
      tags:
      - product
    post:
      consumes:
      - application/json
      parameters:
      - description: 创建商品请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 创建商品
      tags:
      - product
  /api/v1/seckill/activities/{id}/attempt:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: 发起同步版秒杀
      tags:
      - seckill
  /healthz:
    get:
      description: 返回当前服务及其关键依赖的健康状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthSuccessResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.HealthSuccessResponse'
      summary: 健康检查
      tags:
      - base
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
